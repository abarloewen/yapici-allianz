<!-- CALCULATOR -->
<section class="sec sec--pattern">
  <div class="container">
    <div class="calc reveal">
      <div class="calc__tabs">
        <button class="calc__tab active" data-tab="kfz"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l1.6-5.2A2 2 0 018.5 6.4h7A2 2 0 0117.4 7.8L19 13"/><path d="M3 13h18v5H3z"/><circle cx="7.5" cy="18" r="1.6"/><circle cx="16.5" cy="18" r="1.6"/></svg><span data-i18n="calc.tab.kfz"></span></button>
        <button class="calc__tab" data-tab="vorsorge"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 17 9 11 13 15 21 7"/><polyline points="15 7 21 7 21 13"/></svg><span data-i18n="calc.tab.vorsorge"></span></button>
        <button class="calc__tab" data-tab="multi"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><span data-i18n="calc.tab.multi"></span></button>
        <button class="calc__tab" data-tab="leben"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 00-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 10-7.8 7.8L12 21l8.8-8.6a5.5 5.5 0 000-7.8z"/></svg><span data-i18n="calc.tab.leben"></span></button>
      </div>

      <!-- KFZ -->
      <div class="calc__pane active" data-pane="kfz">
        <div class="calc__body">
          <div class="calc__inputs">
            <div class="field">
              <label data-i18n="ck.vehicle"></label>
              <div class="seg" id="k-vehicle">
                <button data-val="small" data-i18n="ck.v.small"></button>
                <button data-val="mid" class="sel" data-i18n="ck.v.mid"></button>
                <button data-val="suv" data-i18n="ck.v.suv"></button>
                <button data-val="lux" data-i18n="ck.v.lux"></button>
              </div>
            </div>
            <div class="field">
              <label data-i18n="ck.cover"></label>
              <div class="seg" id="k-cover">
                <button data-val="haft" class="sel" data-i18n="ck.c.haft"></button>
                <button data-val="teil" data-i18n="ck.c.teil"></button>
                <button data-val="voll" data-i18n="ck.c.voll"></button>
              </div>
            </div>
            <div class="field">
              <label><span data-i18n="ck.age"></span>: <span class="range-val" id="k-age-v">35</span></label>
              <input class="range" type="range" id="k-age" min="18" max="80" value="35">
            </div>
            <div class="field">
              <label><span data-i18n="ck.km"></span>: <span class="range-val" id="k-km-v"></span></label>
              <input class="range" type="range" id="k-km" min="5000" max="50000" step="1000" value="15000">
            </div>
            <div class="field">
              <label data-i18n="ck.region"></label>
              <div class="seg" id="k-region">
                <button data-val="city" data-i18n="ck.r.city"></button>
                <button data-val="town" class="sel" data-i18n="ck.r.town"></button>
                <button data-val="rural" data-i18n="ck.r.rural"></button>
              </div>
            </div>
            <div class="field">
              <label><span data-i18n="ck.sfr"></span>: <span class="range-val" id="k-sfr-v">8</span></label>
              <input class="range" type="range" id="k-sfr" min="0" max="35" value="8">
            </div>
          </div>
          <div class="calc__result">
            <div class="lab" data-i18n="calc.result"></div>
            <div class="calc__big"><span id="k-amount">—</span> <small data-i18n="calc.permonth"></small></div>
            <div class="calc__bd">
              <div class="row"><span data-i18n="ck.bd.base"></span><b id="k-bd-base">—</b></div>
              <div class="row"><span data-i18n="ck.bd.cover"></span><b id="k-bd-cover">—</b></div>
              <div class="row"><span data-i18n="ck.bd.region"></span><b id="k-bd-region">—</b></div>
              <div class="row"><span data-i18n="ck.bd.sfr"></span><b id="k-bd-sfr">—</b></div>
            </div>
            <a class="btn btn--gold btn--block" href="termin.html" style="margin-top:1.4rem" data-i18n="calc.cta"></a>
          </div>
        </div>
      </div>

      <!-- VORSORGE -->
      <div class="calc__pane" data-pane="vorsorge">
        <div class="calc__body">
          <div class="calc__inputs">
            <div class="field">
              <label><span data-i18n="cv.age"></span>: <span class="range-val" id="v-age-v">35</span></label>
              <input class="range" type="range" id="v-age" min="18" max="63" value="35">
            </div>
            <div class="field">
              <label><span data-i18n="cv.retire"></span>: <span class="range-val" id="v-retire-v">67</span></label>
              <input class="range" type="range" id="v-retire" min="60" max="70" value="67">
            </div>
            <div class="field">
              <label data-i18n="cv.income"></label>
              <input class="input" type="number" id="v-income" value="2500" min="0" step="100">
            </div>
            <div class="field">
              <label data-i18n="cv.saved"></label>
              <input class="input" type="number" id="v-saved" value="5000" min="0" step="500">
            </div>
          </div>
          <div class="calc__result">
            <div class="lab" data-i18n="cv.result"></div>
            <div class="calc__big"><span id="v-amount">—</span> <small data-i18n="calc.permonth"></small></div>
            <div class="calc__sub"><span data-i18n="cv.gap"></span>: <b id="v-gap">—</b> <span data-i18n="calc.permonth"></span></div>
            <div class="calc__bd">
              <div class="row"><span data-i18n="cv.bd.years"></span><b id="v-bd-years">—</b></div>
              <div class="row"><span data-i18n="cv.bd.target"></span><b id="v-bd-target">—</b></div>
              <div class="row"><span data-i18n="cv.bd.state"></span><b id="v-bd-state">—</b></div>
              <div class="row"><span data-i18n="cv.bd.gap"></span><b id="v-bd-gap">—</b></div>
            </div>
            <a class="btn btn--gold btn--block" href="termin.html" style="margin-top:1.4rem" data-i18n="calc.cta"></a>
          </div>
        </div>
      </div>

      <!-- MULTI -->
      <div class="calc__pane" data-pane="multi">
        <div class="calc__body">
          <div class="calc__inputs">
            <p class="form__note" style="margin-bottom:1.3rem" data-i18n="cm.intro"></p>
            <div class="field">
              <label data-i18n="cm.q1"></label>
              <div class="seg" id="m-car"><button data-val="yes" class="sel" data-i18n="cm.yes"></button><button data-val="no" data-i18n="cm.no"></button></div>
            </div>
            <div class="field">
              <label data-i18n="cm.q2"></label>
              <div class="seg" id="m-house"><button data-val="rent" class="sel" data-i18n="cm.rent"></button><button data-val="own" data-i18n="cm.own"></button></div>
            </div>
            <div class="field">
              <label data-i18n="cm.q3"></label>
              <div class="seg" id="m-family"><button data-val="yes" class="sel" data-i18n="cm.yes"></button><button data-val="no" data-i18n="cm.no"></button></div>
            </div>
            <div class="field">
              <label data-i18n="cm.q4"></label>
              <div class="seg" id="m-self"><button data-val="yes" data-i18n="cm.yes"></button><button data-val="no" class="sel" data-i18n="cm.no"></button></div>
            </div>
          </div>
          <div class="calc__result">
            <div class="lab" data-i18n="cm.result"></div>
            <div class="calc__big"><span id="m-count">—</span></div>
            <div class="calc__sub" data-i18n="cm.reco"></div>
            <div id="m-reco" style="margin-top:.4rem"></div>
            <a class="btn btn--gold btn--block" href="termin.html" style="margin-top:1.4rem" data-i18n="calc.cta"></a>
          </div>
        </div>
      </div>

      <!-- LEBEN -->
      <div class="calc__pane" data-pane="leben">
        <div class="calc__body">
          <div class="calc__inputs">
            <div class="field">
              <label data-i18n="cl.income"></label>
              <input class="input" type="number" id="l-income" value="30000" min="0" step="1000">
            </div>
            <div class="field">
              <label><span data-i18n="cl.years"></span>: <span class="range-val" id="l-years-v">15</span></label>
              <input class="range" type="range" id="l-years" min="5" max="25" value="15">
            </div>
            <div class="field">
              <label data-i18n="cl.debts"></label>
              <input class="input" type="number" id="l-debts" value="50000" min="0" step="1000">
            </div>
            <div class="field">
              <label><span data-i18n="cl.children"></span>: <span class="range-val" id="l-children-v">2</span></label>
              <input class="range" type="range" id="l-children" min="0" max="6" value="2">
            </div>
          </div>
          <div class="calc__result">
            <div class="lab" data-i18n="cl.result"></div>
            <div class="calc__big" id="l-amount">—</div>
            <div class="calc__bd">
              <div class="row"><span data-i18n="cl.bd.income"></span><b id="l-bd-income">—</b></div>
              <div class="row"><span data-i18n="cl.bd.debts"></span><b id="l-bd-debts">—</b></div>
              <div class="row"><span data-i18n="cl.bd.kids"></span><b id="l-bd-kids">—</b></div>
            </div>
            <a class="btn btn--gold btn--block" href="termin.html" style="margin-top:1.4rem" data-i18n="calc.cta"></a>
          </div>
        </div>
      </div>
    </div>
    <p class="calc__disclaim center" style="margin-top:1.2rem" data-i18n="calc.disclaim"></p>
  </div>
</section>
